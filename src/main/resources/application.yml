spring:
  application:
    name: ModulithApplication

  datasource:
    #    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    #    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1;MODE=LEGACY
    #    username: sa
    #    password: sa
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: dev

  modulith:
    events:
      completion-mode: ARCHIVE
      jdbc:
        schema-initialization:
          enabled: true


server:
  port: 8080

logging:
  level:
    org.springframework.modulith.events: DEBUG

management:

  tracing:
    sampling:
      probability: 1
    export:
      enabled: true

  logging:
    export:
      otlp:
        enabled: true

  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: https://seq.ne.ch/etic/ingest/otlp/v1/traces
          headers:
            X-Seq-ApiKey: s3AHtZIKech5pEQvTA1j

    logging:
      export:
        otlp:
          endpoint: https://seq.ne.ch/etic/ingest/otlp/v1/logs
          headers:
            X-Seq-ApiKey: s3AHtZIKech5pEQvTA1j





