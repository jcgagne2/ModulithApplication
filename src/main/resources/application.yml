spring:
  application:
    name: ModulithApplication

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: dev

  jpa:
    hibernate:
      ddl-auto: create-drop

  modulith:
    events:
      completion-mode: ARCHIVE
      jdbc:
        schema-initialization:
          enabled: true


server:
  port: 8080

logging:
  level:
    org.springframework.modulith.events: DEBUG

management:

  tracing:
    sampling:
      probability: 1
    export:
      enabled: true

  logging:
    export:
      otlp:
        enabled: true

  otlp:
    metrics:
      export:
        enabled: false


  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: https://seq.ne.ch/etic/ingest/otlp/v1/traces
          headers:
            X-Seq-ApiKey: s3AHtZIKech5pEQvTA1j

    logging:
      export:
        otlp:
          endpoint: https://seq.ne.ch/etic/ingest/otlp/v1/logs
          headers:
            X-Seq-ApiKey: s3AHtZIKech5pEQvTA1j




